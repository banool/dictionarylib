name: dictionarylib
description: "Library for the sign language dictionary apps"
version: 0.3.24

publish_to: 'none'

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider:
  collection:
  # https://github.com/yako-dev/flutter-settings-ui/issues/161
  cupertino_icons:
  device_info_plus:
  dolphinsr_dart:
    git:
      url: https://github.com/banool/dolphhinsr_dart.git
      ref: master
  edit_distance: ^0.5.0-nullsafety.0
  flutter:
    sdk: flutter
  flutter_cache_manager:
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.4+1
  flutter_native_splash: 2.4.2
  font_awesome_flutter: ^11.0.0
  go_router: ^14.3.0
  google_fonts: ^6.2.1
  http:
  http_proxy:
    git:
      url: https://github.com/banool/http_proxy
      ref: master
  intl:
  json_annotation: ^4.8.1
  json_serializable: ^6.7.0
  mailto:
  package_info_plus:
  path_provider:
  shared_preferences:
  store_redirect:
  url_launcher:
  media_kit:
  media_kit_video:
  media_kit_libs_video:
  # --- Shared lists feature ---
  app_links: ^6.3.0
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0
  # --- Sharing auth (sign in with Apple / Google / Facebook) ---
  flutter_secure_storage: ^10.3.0
  sign_in_with_apple: ^8.0.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.6

dev_dependencies:
  build_runner: ^2.3.3
  dependency_validator:
  fake_async: ^1.3.1
  flutter_driver:
    sdk: flutter
  flutter_launcher_icons:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints:

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  generate: true
  # Bundle the Hearth typefaces (Hanken Grotesk + Bricolage Grotesque) so the
  # apps render correctly offline. google_fonts picks these up automatically
  # (matching by "<Family>-<Weight>" filename) and runtime fetching is disabled
  # in theme.dart, so no network call is ever made for fonts. These are the
  # static Latin instances; non-Latin scripts fall back to the platform font.
  assets:
    - assets/fonts/HankenGrotesk-Regular.ttf
    - assets/fonts/HankenGrotesk-Medium.ttf
    - assets/fonts/HankenGrotesk-SemiBold.ttf
    - assets/fonts/HankenGrotesk-Bold.ttf
    - assets/fonts/HankenGrotesk-ExtraBold.ttf
    - assets/fonts/BricolageGrotesque-Regular.ttf
    - assets/fonts/BricolageGrotesque-Bold.ttf
