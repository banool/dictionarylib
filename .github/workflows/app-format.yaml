# Reusable formatting gate for the dictionary apps. Called from each app's CI
# via `uses: banool/dictionarylib/.github/workflows/app-format.yaml@main`.
name: App format gate

on:
  workflow_call:
    inputs:
      working_directory:
        type: string
        default: '.'
        description: Directory holding the Flutter app (e.g. frontend for slsl).
      flutter_version:
        type: string
        default: '3.44.5'
      format_paths:
        type: string
        default: 'lib test integration_test test_driver'

jobs:
  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true
      # `dart format` derives its style from the package's language version
      # (the pubspec sdk lower bound), so resolve the package first — without
      # pub get it falls back to the latest style and reformats everything.
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed ${{ inputs.format_paths }}
