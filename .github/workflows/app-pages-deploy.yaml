# Reusable static-site → Cloudflare Pages deploy for the dictionary repos'
# landing sites. Called from each repo's pages.yaml via
# `uses: banool/dictionarylib/.github/workflows/app-pages-deploy.yaml@main`.
#
# Runs from the site directory so wrangler picks up its wrangler.toml (project
# name + output dir).
#
# Custom-domain reconciliation is a one-time, idempotent step owned by the
# private backend repo's Cloudflare CLI (`bun scripts/cf.ts apex|landing`). It
# isn't run here because this public CI can't reach the private script — and a
# deploy never detaches an already-attached domain, so there's nothing to do on
# each push.
name: App landing-site deploy

on:
  workflow_call:
    inputs:
      project_name:
        type: string
        required: true
        description: Cloudflare Pages project, e.g. auslan-dictionary / slsl-landing.
      production_branch:
        type: string
        required: true
        description: The app repo's default branch (master / main).
      working_directory:
        type: string
        default: 'site'
        description: Directory holding the static site + wrangler.toml.
      node_version:
        type: string
        default: '22'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      # The account id is not a credential (it appears in dashboard URLs); a
      # repo secret, if provided, wins, otherwise the literal fallback below
      # is used.
      CLOUDFLARE_ACCOUNT_ID:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '47989fc190166b22bc15768dc41e8693' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Ensure Pages project exists
        run: npx wrangler@latest pages project create ${{ inputs.project_name }} --production-branch=${{ inputs.production_branch }} || true
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy --branch=${{ inputs.production_branch }} --commit-dirty=true
