name: Dart

# CI for the Flutter package. The multi-device sync integration suite
# (test/sharing/multi_device_sync_test.dart) needs the share worker and
# runs in the private backend repo's CI, which checks this repo out next
# to the worker; here it auto-skips because no worker is running.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      # The shared integration-test suites package (consumed by the apps as a
      # git dev_dependency pinned to the same ref as dictionarylib itself).
      - run: flutter pub get
        working-directory: dictionarylib_test_support
      - run: dart format --output=none --set-exit-if-changed lib
        working-directory: dictionarylib_test_support
      - run: flutter analyze --no-fatal-infos
        working-directory: dictionarylib_test_support
