# Reusable Android test/build/release job for the dictionary apps. Called from
# each app's CI via
# `uses: banool/dictionarylib/.github/workflows/app-release-android.yaml@main`.
#
# With publish=true (the default) it writes the signing material, runs the
# tests, builds a signed appbundle, and uploads it to the Play internal track.
# With publish=false it only runs the tests — the mode app CIs use for PRs and
# data-only changes.
#
# Note: the Play upload doesn't work until a single manual upload has been done
# on the Google Play Console UI (see https://stackoverflow.com/a/69899877/3846032).
name: App Android release

on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: true
        description: Android applicationId, e.g. com.banool.auslan_dictionary.
      working_directory:
        type: string
        default: '.'
        description: Directory holding the Flutter app (e.g. frontend for slsl).
      flutter_version:
        type: string
        default: '3.44.5'
      publish:
        type: boolean
        default: true
        description: false = test-only (no signing material, no build, no upload).
    secrets:
      # Required in practice when publish=true; declared optional so callers
      # with empty secrets (fork PRs) fail at the signing step, not the call.
      UPLOAD_KEYSTORE:
        required: false
      KEY_PROPERTIES:
        required: false
      ANDROID_SERVICE_ACCOUNT_JSON:
        required: false

jobs:
  release_android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - run: echo "${{ secrets.UPLOAD_KEYSTORE }}" | base64 -d > android/upload_keystore.jks
        if: inputs.publish
      - run: echo "${{ secrets.KEY_PROPERTIES }}" | base64 -d > android/key.properties
        if: inputs.publish

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter test

      # This will produce a signed appbundle.
      - run: flutter build appbundle
        if: inputs.publish

      - name: Publish Android build to internal track
        uses: r0adkll/upload-google-play@v1.0.15
        if: inputs.publish
        with:
          serviceAccountJsonPlainText: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ inputs.package_name }}
          # Action steps ignore defaults.run.working-directory, so this path is
          # workspace-relative — correct for both '.' and 'frontend'.
          releaseFile: ${{ inputs.working_directory }}/build/app/outputs/bundle/release/app-release.aab
          track: internal
