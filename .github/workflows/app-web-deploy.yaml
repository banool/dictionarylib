# Reusable Flutter-web → Cloudflare Pages deploy for the dictionary apps.
# Called from each app's web.yaml via
# `uses: banool/dictionarylib/.github/workflows/app-web-deploy.yaml@main`.
#
# Custom-domain reconciliation (app.<domain>) is a one-time, idempotent step
# owned by the private backend repo's Cloudflare CLI (`bun scripts/cf.ts app`).
# It isn't run here because this public CI can't reach the private script — and
# a deploy never detaches an already-attached domain, so there's nothing to do
# on each push.
name: App web deploy

on:
  workflow_call:
    inputs:
      project_name:
        type: string
        required: true
        description: Cloudflare Pages project, e.g. auslan-web / slsl-web.
      production_branch:
        type: string
        required: true
        description: The app repo's default branch (master / main).
      working_directory:
        type: string
        default: '.'
        description: Directory holding the Flutter app (e.g. frontend for slsl).
      flutter_version:
        type: string
        default: '3.44.5'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      # The account id is not a credential (it appears in dashboard URLs); a
      # repo secret, if provided, wins, otherwise the literal fallback below
      # is used.
      CLOUDFLARE_ACCOUNT_ID:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '47989fc190166b22bc15768dc41e8693' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true
      # No pubspec_overrides.yaml in CI (it's gitignored), so this resolves
      # dictionarylib from the git ref pinned in pubspec.yaml — keep that pin
      # current with any dictionarylib changes the web build needs.
      - run: flutter pub get
      - run: flutter build web --release
      - name: Ensure Pages project exists
        run: npx wrangler@latest pages project create ${{ inputs.project_name }} --production-branch=${{ inputs.production_branch }} || true
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy build/web --project-name=${{ inputs.project_name }} --branch=${{ inputs.production_branch }} --commit-dirty=true
